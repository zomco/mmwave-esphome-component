name: Publish firmware

# Builds firmware for every radar model in tests/ and uploads artifacts.
# GitHub Pages deployment is handled separately by publish-pages.yml.
on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Step 1: auto-discover all radar model YAML configs ────────────────────
  discover:
    name: Discover radar models
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.list.outputs.configs }}
    steps:
      - uses: actions/checkout@v4
      - name: List test YAML files
        id: list
        run: |
          configs=$(find tests -name "*.yaml" | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "configs=$configs" >> "$GITHUB_OUTPUT"
          echo "Found: $configs"

  # ── Step 2: build each radar model in parallel ────────────────────────────
  build:
    name: Build ${{ matrix.config }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false       # keep building other models even if one fails
      matrix:
        config: ${{ fromJson(needs.discover.outputs.configs) }}
    steps:
      - uses: actions/checkout@v4

      - name: Build ESPHome firmware
        id: build
        uses: esphome/build-action@v6
        with:
          yaml-file: ${{ matrix.config }}
          complete-manifest: "true"          # produce a ready-to-use manifest.json
          release-summary: ${{ github.event.release.body }}
          release-url: ${{ github.event.release.html_url }}

      # Artifact name: firmware-{name}  e.g. firmware-r60abd1-ESP32-C3
      # Artifact contents: manifest.json, *.factory.bin, *.ota.bin
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.build.outputs.name }}
          path: ${{ steps.build.outputs.name }}/
          if-no-files-found: error
          retention-days: 90