name: CI

# Validates that every firmware configuration in tests/ compiles on every PR.
on:
  push:
    branches-ignore:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: Discover test configurations
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.list.outputs.configs }}
    steps:
      - uses: actions/checkout@v4
      - name: List test YAML files
        id: list
        run: |
          configs=$(find tests -name "*.yaml" | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "configs=$configs" >> "$GITHUB_OUTPUT"
          echo "Found: $configs"

  build:
    name: Build ${{ matrix.config }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.discover.outputs.configs) }}
    steps:
      - uses: actions/checkout@v4
      - name: Build ESPHome firmware
        uses: esphome/build-action@v6
        with:
          yaml-file: ${{ matrix.config }}